services:
  - type: web
    name: party-dial-server
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: APPWRITE_ENDPOINT
        sync: false
      - key: APPWRITE_PROJECT_ID
        sync: false
      - key: APPWRITE_API_KEY
        sync: false
      - key: APPWRITE_DATABASE_ID
        sync: false
      - key: APPWRITE_VENUES_COLLECTION_ID
        sync: false
      - key: APPWRITE_LEADS_COLLECTION_ID
        sync: false
      - key: APPWRITE_STORAGE_BUCKET_ID
        sync: false
      - key: NEXT_PUBLIC_APPWRITE_ENDPOINT
        sync: false
      - key: NEXT_PUBLIC_APPWRITE_PROJECT_ID
        sync: false
